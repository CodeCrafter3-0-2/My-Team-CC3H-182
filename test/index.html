<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySync Pro - Swami Shankar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none !important; }
        .nav-link.active { border-bottom: 3px solid #38bdf8; color: #38bdf8; }
    </style>
</head>
<script src="/socket.io/socket.io.js"></script>
<script src="auth.js"></script>
<body>

<div id="auth-screen">
    <div class="card" style="max-width: 400px; margin: 100px auto;">
        <h2 id="auth-title">Login to StudySync</h2>
        <input type="email" id="email" placeholder="Email (admin@gmail.com)">
        <input type="password" id="pass" placeholder="Password (admin)">
        <div id="reg-fields" class="hidden">
            <select id="subject">
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
                <option value="B.Tech">B.Tech</option>
            </select>
        </div>
        <button id="auth-btn" class="btn primary-btn" onclick="handleAuth()">Login</button>
        <p id="toggle-text" onclick="toggleAuthMode()" style="cursor:pointer; color:#38bdf8; font-size:0.8rem; margin-top:15px;">New Student? Register</p>
    </div>
</div>

<div id="main-ui" class="hidden">
    <div class="card">
        <div class="nav-tabs" style="display:flex; justify-content:center; gap:20px; margin-bottom:20px; cursor:pointer;">
            <div class="nav-link" id="tab-study" onclick="switchTab('study-tab')">Study Room</div>
            <div class="nav-link" id="tab-library" onclick="switchTab('library-tab')">Library</div>
            <div class="nav-link" id="tab-profile" onclick="switchTab('profile-tab')">My Profile</div>
        </div>

        <div id="study-tab" class="tab-content hidden"><h3>Study Room Content</h3></div>
        <div id="library-tab" class="tab-content hidden"><h3>Library Content</h3></div>

        <div id="profile-tab" class="tab-content">
            <div style="display:flex; align-items:center; gap:20px; background:#0f172a; padding:20px; border-radius:15px; text-align:left;">
                <div id="prof-avatar" style="width:80px; height:80px; background:#38bdf8; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#000; font-weight:bold;">?</div>
                <div>
                    <h2 id="prof-name" style="margin:0;">Name</h2>
                    <p id="prof-email" style="color:#94a3b8; margin:5px 0;">Email</p>
                    <span id="prof-subject" style="background:#38bdf8; color:#000; padding:2px 10px; border-radius:20px; font-size:0.8rem; font-weight:bold;">Subject</span>
                </div>
            </div>
            <button class="btn" style="background:#ff4757; color:white; margin-top:20px;" onclick="location.reload()">Logout</button>
        </div>

        <div class="swami-footer">made by <b>swami shankar</b></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="auth.js"></script>
<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(tabId).classList.remove('hidden');
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(tabId === 'study-tab') document.getElementById('tab-study').classList.add('active');
        if(tabId === 'library-tab') document.getElementById('tab-library').classList.add('active');
        if(tabId === 'profile-tab') document.getElementById('tab-profile').classList.add('active');
    }
</script>
</body>
</html>
